<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola Eleitoral - Análise Parlamentar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .map-region, .map-state { cursor: pointer; transition: fill 0.2s, transform 0.2s, opacity 0.2s; }
        .map-region:hover, .map-state:hover { fill: #2563eb !important; opacity: 0.9; }
        .hidden { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
        .animate-bounce-slow { animation: bounce-slow 1.6s infinite ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-between p-4 sm:p-6 font-sans">

    <header class="text-center my-4">
        <h1 class="text-3xl font-bold text-blue-400 tracking-tight">Bússola Eleitoral</h1>
        <p class="text-gray-400 mt-2 text-sm sm:text-base" id="instruction-text">Selecione uma região no mapa para começar</p>
    </header>

    <main class="w-full max-w-4xl flex flex-col items-center justify-center bg-gray-800 p-4 sm:p-6 rounded-2xl shadow-2xl border border-gray-700 min-h-[480px] transition-all duration-300 relative">
        
        <!-- TELA 1: MAPA -->
        <div id="brazil-map-container" class="w-full flex flex-col items-center">
            <svg id="brazil-map" viewBox="0 0 400 400" class="w-72 h-72 sm:w-80 sm:h-80">
                <path class="map-region" data-region="Norte" fill="#065f46" d="M 50,50 L 220,50 L 200,180 L 50,150 Z" />
                <path class="map-region" data-region="Nordeste" fill="#1e3a8a" d="M 220,50 L 350,100 L 320,220 L 200,180 Z" />
                <path class="map-region" data-region="Centro-Oeste" fill="#854d0e" d="M 120,170 L 220,180 L 240,280 L 130,270 Z" />
                <path class="map-region" data-region="Sudeste" fill="#991b1b" d="M 220,180 L 320,220 L 290,320 L 210,280 Z" />
                <path class="map-region" data-region="Sul" fill="#374151" d="M 170,280 L 240,280 L 210,370 L 160,350 Z" />
            </svg>
        </div>

        <div id="regional-map-container" class="w-full flex flex-col items-center hidden">
            <button id="btn-back-to-brazil" class="mb-4 text-sm text-blue-400 font-medium">← Voltar</button>
            <svg id="regional-map" viewBox="0 0 400 320" class="w-full max-w-md h-64"></svg>
        </div>

        <div id="parlamentares-pb-container" class="w-full hidden">
            <button id="btn-back-to-themes" class="mb-4 text-sm text-blue-400">← Voltar</button>
            <h2 class="text-2xl font-bold text-blue-400 text-center mb-6">Bancada Federal da Paraíba</h2>
            <div class="relative w-full">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:max-h-[550px] overflow-y-visible md:overflow-y-auto pr-0 md:pr-2 custom-scrollbar" id="parlamentares-grid"></div>
                <div id="scroll-indicator" class="hidden md:flex absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-gray-800 to-transparent pointer-events-none flex-col items-center justify-end pb-1 transition-opacity duration-300">
                    <span class="text-[10px] text-blue-400 font-bold">Role para ver mais</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const dadosParaiba = [
            { nome: "Aguinaldo Ribeiro", partido: "PP", statusClass: "bg-green-500/10 text-green-400" },
            { nome: "Cabo Gilberto Silva", partido: "PL", statusClass: "bg-green-500/10 text-green-400" }
        ];

        function renderizarCardsParaiba() {
            const grid = document.getElementById('parlamentares-grid');
            grid.innerHTML = '';
            dadosParaiba.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-gray-700/30 border border-gray-600 rounded-xl p-4 flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-base font-bold text-white">${p.nome} <span class="text-xs text-blue-400">(${p.partido})</span></h3>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-gray-700 flex justify-between items-center">
                        <span class="text-xs text-gray-400">Eleições 2026:</span>
                        <span class="text-xs font-bold text-green-400">Concorrendo</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Simulação de navegação para teste rápido
        document.querySelectorAll('.map-region').forEach(el => el.addEventListener('click', () => {
            document.getElementById('brazil-map-container').classList.add('hidden');
            document.getElementById('parlamentares-pb-container').classList.remove('hidden');
            renderizarCardsParaiba();
        }));
    </script>
</body>
</html>
