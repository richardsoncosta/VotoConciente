<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola Eleitoral - Análise Parlamentar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .map-region { cursor: pointer; transition: fill 0.2s; }
        .map-region:hover { fill: #2563eb !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">

    <main class="max-w-4xl mx-auto bg-gray-800 p-6 rounded-2xl border border-gray-700">
        
        <!-- TELA 1: SELEÇÃO DE REGIÃO -->
        <div id="view-map" class="text-center">
            <h1 class="text-2xl font-bold text-blue-400 mb-6">Selecione uma Região</h1>
            <svg id="brazil-map" viewBox="0 0 400 400" class="w-80 mx-auto">
                <path class="map-region" data-region="Nordeste" fill="#1e3a8a" d="M 220,50 L 350,100 L 320,220 L 200,180 Z" />
                <!-- Outras regiões seriam preenchidas aqui -->
            </svg>
        </div>

        <!-- TELA 2: PARLAMENTARES PB -->
        <div id="view-parlamentares" class="hidden">
            <button onclick="voltar()" class="text-blue-400 mb-4">← Voltar</button>
            <h2 class="text-xl font-bold mb-6">Bancada Federal da Paraíba</h2>
            <div id="parlamentares-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script>
        // Dados restaurados conforme seu histórico de projetos
        const parlamentares = [
            { 
                nome: "Aguinaldo Ribeiro", partido: "PP", tempo: "12 anos", 
                mandatos: "4 mandatos", outros: "Ministro das Cidades",
                pautas: ["Reforma Tributária", "Infraestrutura"] 
            },
            { 
                nome: "Cabo Gilberto Silva", partido: "PL", tempo: "4 anos", 
                mandatos: "1 mandato", outros: "Deputado Estadual",
                pautas: ["Segurança Pública", "Liberais"] 
            }
        ];

        function renderizarCards() {
            const grid = document.getElementById('parlamentares-grid');
            grid.innerHTML = parlamentares.map(p => `
                <div class="bg-gray-700/30 border border-gray-600 rounded-xl p-4 flex flex-col">
                    <h3 class="font-bold text-lg">${p.nome} <span class="text-sm text-blue-400">(${p.partido})</span></h3>
                    <div class="mt-2 text-sm text-gray-300">
                        <p><strong>Tempo:</strong> ${p.tempo} (${p.mandatos})</p>
                        <p><strong>Outros:</strong> ${p.outros}</p>
                        <p><strong>Pautas:</strong> ${p.pautas.join(', ')}</p>
                    </div>
                    <!-- Rodapé ajustado solicitado -->
                    <div class="mt-auto pt-4 border-t border-gray-700 flex justify-between text-xs">
                        <span class="text-gray-400">Eleições 2026:</span>
                        <span class="font-bold text-green-400">Concorrendo</span>
                    </div>
                </div>
            `).join('');
        }

        // Navegação
        document.querySelector('.map-region').addEventListener('click', () => {
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-parlamentares').classList.remove('hidden');
            renderizarCards();
        });

        function voltar() {
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('view-parlamentares').classList.add('hidden');
        }
    </script>
</body>
</html>
